# ================================================================
#  TicketNova — GitHub Actions CI/CD Pipeline
#  File: .github/workflows/ci-cd.yml
#
#  Stages:
#   1. test          → Install deps, run Jest tests
#   2. build         → Build & push Docker image to GHCR
#   3. security      → Trivy vulnerability scan
#   4. deploy-staging   → Auto-deploy on 'develop' branch push
#   5. deploy-production → Auto-deploy on 'main' branch push
# ================================================================

name: TicketNova CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME:      ticketnova
  REGISTRY:        ghcr.io
  IMAGE_FULL_NAME: ghcr.io/${{ github.repository_owner }}/ticketnova

jobs:

  # ── Stage 1: Test ──────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Tests
        working-directory: backend
        run: npm test -- --forceExit

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  # ── Stage 2: Build & Push Docker Image ─────────────────────
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    outputs:
      image_tag:    ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FULL_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build & Push Docker Image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          target:    production
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Image Summary
        run: |
          echo "## 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.IMAGE_FULL_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** ${{ steps.build-push.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ── Stage 3: Security Scan ─────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:     ${{ env.IMAGE_FULL_NAME }}:latest
          format:        sarif
          output:        trivy-results.sarif
          severity:      CRITICAL,HIGH
          exit-code:     0     # Don't fail build on findings — upload report only

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Security Summary
        run: echo "## 🔒 Security scan complete — check Security tab for findings" >> $GITHUB_STEP_SUMMARY

  # ── Stage 4: Deploy to Staging ─────────────────────────────
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/develop'

    environment:
      name: staging
      url: http://staging.ticketnova.example.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Staging Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          port:     22
          script: |
            echo "=== Pulling latest image ==="
            docker pull ${{ env.IMAGE_FULL_NAME }}:develop

            echo "=== Stopping old container ==="
            docker stop ticketnova-staging 2>/dev/null || true
            docker rm   ticketnova-staging 2>/dev/null || true

            echo "=== Starting new container ==="
            docker run -d \
              --name ticketnova-staging \
              --restart unless-stopped \
              -p 3001:3000 \
              -e NODE_ENV=staging \
              -e PORT=3000 \
              ${{ env.IMAGE_FULL_NAME }}:develop

            echo "=== Health check ==="
            sleep 5
            curl -f http://localhost:3001/health && echo "✅ Staging healthy!"

            echo "=== Cleanup old images ==="
            docker image prune -f

      - name: Staging Deployment Summary
        run: |
          echo "## 🚀 Staging Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** develop" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.IMAGE_FULL_NAME }}:develop" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** http://staging.ticketnova.example.com" >> $GITHUB_STEP_SUMMARY

  # ── Stage 5: Deploy to Production ──────────────────────────
  deploy-production:
    name: 🌍 Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: http://ticketnova.example.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Production Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          port:     22
          script: |
            echo "=== Navigating to app directory ==="
            cd /opt/ticketnova

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Pulling latest Docker image ==="
            docker compose pull

            echo "=== Rolling update (zero-downtime) ==="
            docker compose up -d --remove-orphans

            echo "=== Health check ==="
            sleep 10
            curl -f http://localhost/health && echo "✅ Production healthy!"

            echo "=== Cleanup ==="
            docker image prune -f
            docker system prune -f --volumes=false

      - name: Production Deployment Summary
        run: |
          echo "## 🌍 Production Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.IMAGE_FULL_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** http://ticketnova.example.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
