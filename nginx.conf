# ================================================================
#  TicketNova — Nginx Configuration
#  File: nginx/nginx.conf
#
#  Role: Reverse proxy + static file server
#  Listens on :80 → proxies /api/* to app:3000
# ================================================================

# Upstream — Node.js application
upstream ticketnova_app {
    server app:3000;        # Docker service name resolves automatically
    keepalive 32;           # Reuse connections for performance
}

server {
    listen 80;
    server_name _;          # Catch-all (works for any domain/IP)

    # ── Gzip Compression ───────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security Headers ────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"          always;
    add_header X-XSS-Protection       "1; mode=block"       always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;
    server_tokens off;      # Hide Nginx version from headers

    # ── API Proxy ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://ticketnova_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Health Check Proxy ───────────────────────────────────
    location /health {
        proxy_pass http://ticketnova_app;
        proxy_set_header Host $host;
        access_log off;     # Don't pollute logs with health checks
    }

    # ── Static Frontend (SPA) ────────────────────────────────
    location / {
        proxy_pass         http://ticketnova_app;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache static assets aggressively
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            proxy_pass http://ticketnova_app;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Custom Error Pages ───────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error":"Service temporarily unavailable"}';
        add_header Content-Type application/json;
    }
}
