services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ticketnova:latest
    container_name: ticketnova-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - ticketnova-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: ticketnova-nginx:latest
    container_name: ticketnova-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ticketnova-net

networks:
  ticketnova-net:
    driver: bridge
    name: ticketnova-network
