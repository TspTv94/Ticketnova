# Copy this file to inventory.ini and fill in your server IPs
# DO NOT push inventory.ini to GitHub (contains real IPs)

[jenkins]
YOUR_JENKINS_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/ticketnova-key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[app]
YOUR_APP_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/ticketnova-key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'
